name: Release

# Publishes to PyPI when a version tag is pushed.
#
# Release flow:
#   1. Bump `version` in pyproject.toml and update CHANGELOG.md.
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
#
# One-time setup (manual, on pypi.org):
#   Register this repo as a Trusted Publisher for the `agentry` project
#   (workflow: release.yml, environment: pypi). No API token is stored.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build wheel + sdist
        run: uv build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentry
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
