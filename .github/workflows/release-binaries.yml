# .github/workflows/release-binaries.yml
name: Release Binaries

# Builds standalone `agy` executables + native installers and attaches them to
# the GitHub Release for a v* tag. This is the sole release/distribution channel
# (no PyPI).
#
# Artifacts per release:
#   agy-<version>-linux-x86_64                 raw binary
#   agy-<version>-macos-x86_64                 raw binary
#   agy-<version>-macos-arm64                  raw binary
#   agy-<version>-macos-x86_64.pkg             macOS installer (per-user)
#   agy-<version>-macos-arm64.pkg              macOS installer (per-user)
#   agy-<version>-windows-x86_64.exe           raw binary
#   agy-<version>-windows-x86_64-setup.exe     Inno Setup installer
#   agy_<version>_amd64.deb                    Debian/Ubuntu package
#   agy-<version>.x86_64.rpm                   Fedora/RHEL package
#   agy-<version>-linux-x86_64.tar.gz          tarball
#   SHA256SUMS.txt                             checksums for all of the above
#   <asset>.cosign.bundle                      keyless Sigstore signature per asset
#
# Every asset is signed with cosign keyless (Sigstore) via GitHub OIDC — no
# secrets or certificates required. See packaging/README.md for how users verify.
#
# workflow_dispatch builds + uploads artifacts for inspection but does NOT
# create a Release or sign (dry run).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,  target: linux-x86_64,   ext: "" }
          - { runner: macos-13,       target: macos-x86_64,    ext: "" }
          - { runner: macos-14,       target: macos-arm64,     ext: "" }
          - { runner: windows-latest, target: windows-x86_64,  ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build binary
        run: uv run --extra build pyinstaller packaging/agy.spec
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(./dist/agy${{ matrix.ext }} version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          fi

      # --- Linux: native packages (.deb / .rpm) + tarball, from ./dist/agy ---
      - name: Build Linux packages
        if: matrix.target == 'linux-x86_64'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v2.41.3/nfpm_2.41.3_amd64.deb" -o /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb
          nfpm package -f packaging/nfpm.yaml -p deb -t .
          nfpm package -f packaging/nfpm.yaml -p rpm -t .
          tar -czf "agy-${VERSION}-linux-x86_64.tar.gz" -C dist agy

      # --- Windows: Inno Setup installer, from dist\agy.exe ---
      - name: Build Windows installer
        if: matrix.target == 'windows-x86_64'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            packaging\windows\agy.iss
          # Keep every release asset flat at the repo root for a clean upload.
          Move-Item dist\agy-*-setup.exe .

      # --- macOS: per-user .pkg installer (~/.local/bin), from ./dist/agy ---
      - name: Build macOS installer
        if: startsWith(matrix.target, 'macos-')
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          # Payload rooted at the user's home; enable_currentUserHome maps it to ~,
          # so ./local/bin/agy lands at ~/.local/bin/agy (matches install.sh).
          mkdir -p pkgroot/.local/bin
          cp dist/agy pkgroot/.local/bin/agy
          chmod +x pkgroot/.local/bin/agy
          chmod +x packaging/macos/scripts/postinstall
          pkgbuild --root pkgroot \
            --identifier com.opentech.agentry \
            --version "$VERSION" \
            --scripts packaging/macos/scripts \
            --install-location / \
            agy-component.pkg
          sed "s/\${VERSION}/$VERSION/g" packaging/macos/distribution.xml > distribution.xml
          productbuild --distribution distribution.xml \
            --package-path . \
            "agy-${VERSION}-${TARGET}.pkg"
          # Verify the payload lands at ~/.local/bin/agy.
          pkgutil --expand-full "agy-${VERSION}-${TARGET}.pkg" /tmp/pkgcheck
          ls /tmp/pkgcheck/*.pkg/Payload/.local/bin/agy

      - name: Rename raw binary
        shell: bash
        run: mv "dist/agy${{ matrix.ext }}" "agy-${{ steps.ver.outputs.version }}-${{ matrix.target }}${{ matrix.ext }}"
      - name: Smoke test
        shell: bash
        run: ./agy-${{ steps.ver.outputs.version }}-${{ matrix.target }}${{ matrix.ext }} version

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agy-${{ matrix.target }}
          # Raw binary, plus any installer/packages produced above — all live
          # flat at the repo root, so a single set of globs keeps the layout.
          path: |
            agy-*
            *.deb
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release + upload assets
      id-token: write   # cosign keyless signing via OIDC
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Generate checksums
        working-directory: artifacts
        run: |
          sha256sum agy-* agy_* > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Sign all assets (cosign keyless)
        working-directory: artifacts
        run: |
          shopt -s nullglob
          for f in agy-* agy_* SHA256SUMS.txt; do
            case "$f" in *.cosign.bundle) continue ;; esac
            echo "Signing $f"
            cosign sign-blob --yes --bundle "$f.cosign.bundle" "$f"
          done
      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
