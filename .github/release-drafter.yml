name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels: ["feature", "enhancement"]
  - title: "🐛 Fixes"
    labels: ["fix", "bug"]
  - title: "📚 Documentation"
    labels: ["docs", "documentation"]
  - title: "🧰 Maintenance"
    labels: ["chore", "ci", "dependencies", "refactor"]
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels: ["major", "breaking"]
  minor:
    labels: ["minor", "feature", "enhancement"]
  patch:
    labels: ["patch", "fix", "bug", "chore", "docs", "dependencies"]
  default: patch
template: |
  ## What's changed

  $CHANGES

  **Full changelog**: https://github.com/opentech/agentry/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
