site_name: agentry
site_description: A dependency manager for AI coding agents.
site_url: https://opentechil.github.io/agentry/
repo_url: https://github.com/OpenTechIL/agentry
repo_name: OpenTechIL/agentry
edit_uri: edit/main/docs/

docs_dir: docs

# Internal design/strategy artifacts (superpowers specs/plans, competitive analysis).
# They cross-reference source files via paths that escape docs_dir, so keep them out of
# the published, strict-validated site.
exclude_docs: |
  superpowers/
  cm-an-apm-2026-06-30/

# Promote link/anchor problems to warnings so `mkdocs build --strict` fails on
# dead internal links and missing heading anchors (not just missing files).
validation:
  links:
    not_found: warn
    anchors: warn

theme:
  name: material
  logo: branding/logo.svg
  favicon: branding/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Commands: commands.md
  - Knowledge base: knowledge-base.md
  - Branding: branding-kit.md
  - Contributing: https://github.com/OpenTechIL/agentry/blob/main/CONTRIBUTING.md
  - Changelog: https://github.com/OpenTechIL/agentry/blob/main/CHANGELOG.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/OpenTechIL/agentry
